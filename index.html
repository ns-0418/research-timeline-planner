<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工作與日常時程管理表 v12</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap");
    :root {
      --bg:#f5f1ea; --paper:#fffdf8; --paper-2:#fbf8f1; --ink:#28231b; --muted:#736b61;
      --line:#dfd5c8; --deep:#3b3021; --deep-2:#4c412f; --shadow:0 10px 25px rgba(43,34,23,.07);
      --radius:18px; --accent:#7a6ee6; --green:#269c7e; --orange:#d7673f; --blue:#2c6ea7;
      --red:#bb4b4b; --pink:#c45a87; --teal:#1f8d91; --yellow:#d6a326; --lavender:#8b6fd6; --brown:#9a6b42; --gray:#9c958d;
      font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC","Heiti TC",Arial,sans-serif;
    }
    *{box-sizing:border-box} html{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC","Heiti TC",Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{margin:0;color:var(--ink);background:var(--bg);line-height:1.6} button,input,select,textarea{font:inherit}
    button{border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:12px;padding:8px 12px;cursor:pointer;font-weight:600;transition:background .12s ease,border .12s ease,transform .08s ease}
    button:hover{background:#fff;border-color:#cabaa8} button:active{transform:translateY(1px)} button.primary{background:var(--deep);color:#fff;border-color:var(--deep)} button.primary:hover{background:var(--deep-2)} button.ghost{background:transparent} button.danger{color:var(--red);border-color:#e2b5b5} button.small{padding:4px 8px;border-radius:10px;font-size:13px} button.muted{color:var(--muted)}
    header{background:var(--deep);color:#fff;padding:22px 32px 20px;display:flex;justify-content:space-between;gap:24px;align-items:flex-start;position:sticky;top:0;z-index:10;box-shadow:0 2px 0 rgba(255,255,255,.08) inset}
    .title h1{margin:0;font-size:24px;letter-spacing:.02em;font-weight:800}.title p{margin:4px 0 0;color:#e8e0d4;font-size:14px}.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .bar{background:var(--paper-2);border-bottom:1px solid var(--line);padding:12px 32px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}.filters,.view-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.filters span.label{color:var(--muted);font-size:14px;margin-right:2px}.summary{color:var(--muted);font-size:14px;text-align:right;max-width:560px}.filter-chip,.view-toggle{border:1px solid var(--line);background:#fffbf4;color:var(--deep);border-radius:999px;padding:7px 14px;font-size:14px;user-select:none}.filter-chip.active,.view-toggle.active{background:var(--deep);color:#fff;border-color:var(--deep)}
    .workspace-bar{background:#efe6d9;border-bottom:1px solid var(--line);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.workspace-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.workspace-tab{border-radius:999px;background:#fff9f0;border-color:#d7c7b7;color:#4a3d2c;padding:8px 15px}.workspace-tab.active{background:var(--deep);color:#fff;border-color:var(--deep)}.workspace-actions{display:flex;gap:8px;flex-wrap:wrap}.workspace-empty-note{font-size:13px;color:var(--muted)}
    main{width:min(1120px,calc(100% - 36px));margin:26px auto 60px}.page-heading{margin:0 auto 16px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow)}.page-heading h2{margin:0;font-size:24px;color:var(--ink);font-weight:800}.page-heading p{margin:6px 0 0;color:var(--muted);font-size:14px}.page-heading p:empty{display:none}.notice{margin:0 auto 20px;background:rgba(255,255,255,.55);border:1px dashed #cdbfaf;border-radius:16px;padding:14px 18px;color:var(--muted);display:flex;justify-content:space-between;gap:12px;align-items:center}
    .fab-row{display:flex;justify-content:center;margin:20px 0}.add-stage-btn{border-style:dashed;padding:13px 28px;color:var(--muted)}
    .stage{background:var(--paper);border:1px solid var(--line);border-top-width:5px;border-radius:var(--radius);box-shadow:var(--shadow);margin:0 0 20px;overflow:hidden}.stage.hidden{filter:grayscale(.9);opacity:.64;background:#f4f2ee}.stage.hidden .items{background:#f7f6f3}.stage-header{padding:18px 20px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}.stage-title{display:flex;gap:12px;align-items:flex-start} .drag-handle{color:#b4a89b;font-size:18px;cursor:grab;user-select:none}.drag-handle:active{cursor:grabbing}.stage,.item,.subtask,.subtask-editor{transition:transform .18s ease,opacity .18s ease,box-shadow .18s ease,filter .18s ease}.dragging{opacity:.35!important;box-shadow:0 14px 34px rgba(122,110,230,.18)!important}.drag-over{outline:2px dashed #9f8cff!important;outline-offset:3px}.drag-over-before,.drag-over-after{position:relative}.drag-over-before::before,.drag-over-after::after{content:"";position:absolute;left:10px;right:10px;height:3px;border-radius:999px;background:repeating-linear-gradient(90deg,#8f80ff 0 12px,transparent 12px 18px);box-shadow:0 0 0 4px rgba(143,128,255,.10);z-index:5;pointer-events:none}.stage.drag-over-before::before{top:-12px}.stage.drag-over-after::after{bottom:-12px}.item.drag-over-before::before,.subtask.drag-over-before::before,.subtask-editor.drag-over-before::before{top:-9px}.item.drag-over-after::after,.subtask.drag-over-after::after,.subtask-editor.drag-over-after::after{bottom:-9px}.drag-shift-up{transform:translateY(-14px)}.drag-shift-down{transform:translateY(14px)}.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:0 0 auto;margin-top:8px}.dot.purple{background:var(--accent)}.dot.green{background:var(--green)}.dot.orange{background:var(--orange)}.dot.blue{background:var(--blue)}.dot.red{background:var(--red)}.dot.pink{background:var(--pink)}.dot.teal{background:var(--teal)}.dot.yellow{background:var(--yellow)}.dot.lavender{background:var(--lavender)}.dot.brown{background:var(--brown)}.dot.gray{background:var(--gray)}
    .color-purple{border-top-color:var(--accent)!important}.color-green{border-top-color:var(--green)!important}.color-orange{border-top-color:var(--orange)!important}.color-blue{border-top-color:var(--blue)!important}.color-red{border-top-color:var(--red)!important}.color-pink{border-top-color:var(--pink)!important}.color-teal{border-top-color:var(--teal)!important}.color-yellow{border-top-color:var(--yellow)!important}.color-lavender{border-top-color:var(--lavender)!important}.color-brown{border-top-color:var(--brown)!important}.color-gray{border-top-color:var(--gray)!important}
    .stage h2{margin:0;font-size:19px;letter-spacing:.01em;font-weight:800}.stage-meta{color:var(--muted);font-size:14px;margin-top:2px}.stage-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end}.items{padding:14px 18px 18px}
    .pill{border:1px solid currentColor;border-radius:999px;padding:3px 9px;font-size:13px;font-weight:600;white-space:nowrap;background:#fff}.status-待確認,.status-待辦{color:#b27612;background:#fff8e5}.status-進行中{color:#2f77a5;background:#edf7ff}.status-完成{color:#178a68;background:#ecfbf5}.status-延期{color:#bd5038;background:#fff1ec}.status-等待IRB{color:#6d61d8;background:#f0efff}.status-無{color:#756d63;background:#f8f5ef}.status-隱藏{color:#6e6a64;background:#f2f0ec}
    .item{border:1px solid #eadfd2;background:linear-gradient(90deg,rgba(255,255,255,.97),rgba(255,253,248,.98));border-radius:15px;padding:14px 16px;margin:12px 0;border-left:7px solid #c8b8a7}.item.hidden{filter:grayscale(.9);opacity:.55;background:#f5f4f0}.item.color-purple{border-left-color:var(--accent)}.item.color-green{border-left-color:var(--green)}.item.color-orange{border-left-color:var(--orange)}.item.color-blue{border-left-color:var(--blue)}.item.color-red{border-left-color:var(--red)}.item.color-pink{border-left-color:var(--pink)}.item.color-teal{border-left-color:var(--teal)}.item.color-yellow{border-left-color:var(--yellow)}.item.color-lavender{border-left-color:var(--lavender)}.item.color-brown{border-left-color:var(--brown)}.item.color-gray{border-left-color:var(--gray)}.item-top{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.item-title{font-size:17px;font-weight:800;margin:0;letter-spacing:.005em}.item-meta{color:var(--muted);font-size:13px;margin-top:2px}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.tag{border:1px solid #ded2c5;border-radius:999px;padding:2px 8px;font-size:12px;color:#5d554a;background:#fbf6ec}.tag.aud-幼兒園{color:#176c70;background:#eaf8f7;border-color:#b9dddd}.tag.aud-家長研究對象{color:#a23e68;background:#fff0f6;border-color:#e7b8cc}.tag.aud-教學老師{color:#99711b;background:#fff8df;border-color:#e5cd80}.tag.aud-研究團隊{color:#6357c5;background:#f1efff;border-color:#c7c1f0}.tag.aud-IRB文件{color:#bd5038;background:#fff1ec;border-color:#e4b2a5}.tag.aud-資料分析{color:#2b6696;background:#eef7ff;border-color:#b8d4ea}
    .date-badge{display:inline-flex;align-items:center;justify-content:center;min-width:88px;border-radius:999px;padding:3px 9px;border:1px solid #d8c8b8;background:#fff8e9;color:#7b5930;font-size:12px;font-variant-numeric:tabular-nums;font-weight:700}.date-badge.date-截止日期{background:#fff1ec;color:#a54231;border-color:#e4b2a5}.date-badge.date-提醒日期{background:#eef7ff;color:#2b6696;border-color:#b8d4ea}.date-badge.date-會議時間{background:#f1efff;color:#6357c5;border-color:#c7c1f0}.date-badge.date-資料回收{background:#ecfbf5;color:#178a68;border-color:#bde1d4}.date-kind{font-size:11px;font-weight:800;margin-right:6px;padding-right:6px;border-right:1px solid rgba(90,70,48,.25);letter-spacing:.02em}
    .subtasks{margin:12px 0 0;border-top:1px dashed #dfd1c2;padding-top:10px}.subtask{display:grid;grid-template-columns:24px 145px 1fr auto;gap:10px;align-items:start;padding:8px 0 8px 8px;border-bottom:1px solid #f0e7dc;font-size:14px;border-left:5px solid #c8b8a7;border-radius:8px}.subtask.color-purple{border-left-color:var(--accent)}.subtask.color-green{border-left-color:var(--green)}.subtask.color-orange{border-left-color:var(--orange)}.subtask.color-blue{border-left-color:var(--blue)}.subtask.color-red{border-left-color:var(--red)}.subtask.color-pink{border-left-color:var(--pink)}.subtask.color-teal{border-left-color:var(--teal)}.subtask.color-yellow{border-left-color:var(--yellow)}.subtask.color-lavender{border-left-color:var(--lavender)}.subtask.color-brown{border-left-color:var(--brown)}.subtask.color-gray{border-left-color:var(--gray)}.subtask:last-child{border-bottom:0}.sub-date{font-variant-numeric:tabular-nums}.sub-note{color:var(--muted);font-size:13px;margin-top:2px}.empty{color:var(--muted);text-align:center;padding:22px}
    .rich-text{margin-top:8px;color:#4f493f;font-size:14px;line-height:1.75;white-space:normal}.rich-text p{margin:0 0 5px}.rich-text ul,.rich-text ol{margin:4px 0 6px 1.3em;padding:0}.rich-text li{margin:2px 0}.checkline{display:flex;gap:8px;align-items:flex-start;margin:3px 0}.fake-check{width:17px;height:17px;border-radius:5px;border:1px solid #cdbfaf;background:#fffefa;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:3px;font-size:12px;color:var(--green)}.fake-check.checked{background:#ecfbf5;border-color:#8bc9b5}
    .date-board{display:none}.date-view .date-board{display:block}.date-view #timeline,.date-view #hiddenStageArea,.date-view .add-stage-btn{display:none}.date-panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.date-panel-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center}.date-panel-head h2{margin:0;font-size:19px;font-weight:800}.date-list{padding:8px 18px 18px}.date-row{display:grid;grid-template-columns:150px 1fr auto;gap:12px;align-items:start;padding:13px 0 13px 10px;border-bottom:1px solid #eee4d8;border-left:5px solid transparent;border-radius:8px}.date-row.color-purple{border-left-color:var(--accent)}.date-row.color-green{border-left-color:var(--green)}.date-row.color-orange{border-left-color:var(--orange)}.date-row.color-blue{border-left-color:var(--blue)}.date-row.color-red{border-left-color:var(--red)}.date-row.color-pink{border-left-color:var(--pink)}.date-row.color-teal{border-left-color:var(--teal)}.date-row.color-yellow{border-left-color:var(--yellow)}.date-row.color-lavender{border-left-color:var(--lavender)}.date-row.color-brown{border-left-color:var(--brown)}.date-row.color-gray{border-left-color:var(--gray)}.date-row:last-child{border-bottom:0}.date-row-title{font-weight:800;margin-bottom:2px}.date-row-meta{color:var(--muted);font-size:13px}.date-row .rich-text{margin-top:5px}
    dialog{border:1px solid var(--line);border-radius:18px;padding:0;width:min(820px,calc(100% - 26px));box-shadow:0 24px 70px rgba(38,31,22,.28);background:var(--paper)}dialog::backdrop{background:rgba(30,24,18,.35);backdrop-filter:blur(2px)}.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head h3{margin:0;font-size:20px}.modal-body{padding:18px 22px 22px;max-height:min(78vh,820px);overflow:auto}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-row{margin-bottom:14px}label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}input[type="text"],input[type="date"],select,textarea{width:100%;border:1px solid var(--line);background:#fffefa;border-radius:12px;padding:9px 10px;color:var(--ink)}textarea{min-height:88px;resize:vertical}.checks{display:flex;gap:8px;flex-wrap:wrap}.check{border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:#fffefa;font-size:13px;display:inline-flex;align-items:center;gap:5px}.subtask-editor{background:#fbf7ef;border:1px solid #eadfd2;border-radius:14px;padding:12px;margin:10px 0}.subtask-editor-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--muted);font-size:13px}.subtask-editor-head .drag-handle{font-size:17px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.editor-help{color:var(--muted);font-size:12px;margin-top:4px}.hide{display:none!important}#confirmDialog{width:min(460px,calc(100% - 30px))}#confirmMessage{margin:0;color:#4f493f;line-height:1.8}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--deep);color:white;border-radius:999px;padding:10px 16px;box-shadow:0 14px 32px rgba(36,29,20,.24);z-index:1200;opacity:0;pointer-events:none;transition:opacity .18s ease,bottom .18s ease;font-size:14px}.toast.show{opacity:1;bottom:34px}.screenshot-exit{display:none;position:fixed;right:22px;bottom:22px;z-index:999;box-shadow:0 12px 28px rgba(36,29,20,.20);background:var(--deep);color:white;border-color:var(--deep)}
    .screenshot-mode .edit-only{display:none!important}.screenshot-mode .screenshot-exit{display:block!important}.screenshot-mode header{position:static}.screenshot-mode main{width:min(1050px,calc(100% - 24px));margin-top:20px}.screenshot-mode .stage,.screenshot-mode .item{box-shadow:none;page-break-inside:avoid}
    @media(max-width:760px){header{padding:18px;display:block}.top-actions{justify-content:flex-start;margin-top:12px}.bar{padding:12px 18px}.summary{text-align:left}.stage-header,.item-top,.date-row{grid-template-columns:1fr}.stage-actions{justify-content:flex-start}.subtask{grid-template-columns:24px 1fr;gap:6px}.subtask .sub-date,.subtask .stage-actions{grid-column:2}.form-grid{grid-template-columns:1fr}}
    @media print{.edit-only{display:none!important}header,.bar{position:static}body{background:#fff}main{width:100%;margin:0}.stage{box-shadow:none}}
  </style>
</head>
<body>
  <header>
    <div class="title"><h1 id="siteTitle">工作與日常時程管理表</h1><p id="siteSubtitle">統整研究、工作與日常事項的時間安排</p></div>
    <div class="top-actions edit-only">
      <button id="settingsBtn" type="button">頁面設定</button><button id="exportBtn" type="button">匯出 JSON</button><button id="importBtn" type="button">匯入 JSON</button><button id="screenshotBtn" type="button">截圖模式</button><button id="addItemTopBtn" class="primary" type="button">＋新增事項</button>
      <input id="importFile" type="file" accept="application/json" class="hide" />
    </div>
  </header>
  <section class="workspace-bar">
    <div class="workspace-tabs" id="workspaceTabs"></div>
    <div class="workspace-actions edit-only"><button id="addWorkspaceBtn" type="button">＋新增頁面</button><button id="editWorkspaceBtn" type="button">編輯頁面</button><button id="deleteWorkspaceBtn" class="danger" type="button">刪除頁面</button></div>
  </section>
  <section class="bar">
    <div class="filters" id="filters"><span class="label">對象</span></div>
    <div class="view-controls">
      <button class="view-toggle active" id="timelineViewBtn" type="button">時間軸</button><button class="view-toggle" id="dateViewBtn" type="button">日期總表</button><button class="view-toggle edit-only" id="sortModeBtn" type="button">排序：日期優先</button>
    </div>
    <div class="summary" id="summaryText"></div>
  </section>
  <main>
    <section class="page-heading"><h2 id="pageTitle">研究執行時間軸</h2><p id="pageSubtitle">執行期間2026/7/1－2027/2/28</p></section>
    <div class="notice"><span id="noticeText">目前狀態：IRB 核准後進行園所協調與正式收案。</span><button class="small ghost edit-only" id="editNoticeBtn" type="button">修改說明</button></div>
    <div class="fab-row edit-only"><button class="add-stage-btn" id="addStageTopBtn" type="button">＋ 在最上方新增階段</button></div>
    <section id="timeline"></section>
    <div class="fab-row edit-only"><button class="add-stage-btn" id="addStageBottomBtn" type="button">＋ 新增階段</button></div>
    <section id="hiddenStageArea"></section>
    <section class="date-board" id="dateBoard"></section>
  </main>
  <button class="screenshot-exit" id="screenshotExitBtn" type="button">離開截圖模式</button>

  <dialog id="settingsDialog"><form method="dialog" id="settingsForm"><div class="modal-head"><h3>目前頁面設定</h3><button value="cancel" class="small ghost" type="button" data-close-dialog="settingsDialog">關閉</button></div><div class="modal-body"><div class="form-row"><label>頁面名稱（上方按鈕）</label><input id="settingName" type="text" /></div><div class="form-row"><label>標題</label><input id="settingTitle" type="text" /></div><div class="form-row"><label>副標</label><input id="settingSubtitle" type="text" /></div><div class="form-row"><label>上方說明</label><textarea id="settingNotice"></textarea></div><div class="modal-actions"><button type="button" data-close-dialog="settingsDialog">取消</button><button class="primary" type="submit">儲存</button></div></div></form></dialog>

  <dialog id="stageDialog"><form id="stageForm"><div class="modal-head"><h3 id="stageDialogTitle">新增階段</h3><button class="small ghost" type="button" data-close-dialog="stageDialog">關閉</button></div><div class="modal-body"><input id="stageId" type="hidden" /><div class="form-row"><label>階段名稱</label><input id="stageTitleInput" type="text" placeholder="例如：階段二｜共通準備與文件確認" /></div><div class="form-grid"><div class="form-row"><label>開始日期</label><input id="stageStartInput" type="date" /></div><div class="form-row"><label>結束／截止日期</label><input id="stageEndInput" type="date" /></div><div class="form-row"><label>狀態</label><select id="stageStatusInput"></select></div><div class="form-row"><label>階段顏色</label><select id="stageColorInput"></select></div></div><div class="form-row"><label>階段說明</label><textarea id="stageDescInput" placeholder="可以換行、使用項目符號或編號。"></textarea><div class="editor-help">儲存後會保留換行，也支援 - 項目、1. 編號、[ ] 勾選格式。</div></div><div class="modal-actions"><button type="button" data-close-dialog="stageDialog">取消</button><button class="primary" id="saveStageBtn" type="submit">儲存階段</button></div></div></form></dialog>

  <dialog id="itemDialog"><form id="itemForm"><div class="modal-head"><h3 id="itemDialogTitle">新增事項</h3><button class="small ghost" type="button" data-close-dialog="itemDialog">關閉</button></div><div class="modal-body"><input id="itemId" type="hidden" /><div class="form-row"><label>事項名稱</label><input id="itemTitleInput" type="text" placeholder="例如：家長同意書發放與回收" /></div><div class="form-grid"><div class="form-row"><label>所屬階段</label><select id="itemStageInput"></select></div><div class="form-row"><label>狀態</label><select id="itemStatusInput"></select></div><div class="form-row"><label>日期類型</label><select id="itemDateTypeInput"></select></div><div class="form-row"><label>事項顏色</label><select id="itemColorInput"></select></div><div class="form-row"><label>開始／執行日期</label><input id="itemStartInput" type="date" /></div><div class="form-row"><label>結束／截止日期</label><input id="itemEndInput" type="date" /></div></div><div class="form-row"><label>對象，可複選</label><div class="checks" id="audienceChecks"></div></div><div class="form-grid"><div class="form-row"><label>負責人</label><input id="itemOwnerInput" type="text" /></div><div class="form-row"><label>地點／備註標籤</label><input id="itemPlaceInput" type="text" /></div></div><div class="form-row"><label>任務內容／備註</label><textarea id="itemDescInput" placeholder="可以換行，例如：&#10;- 先寄送文件&#10;- 再約園長會議&#10;[ ] 確認日期&#10;[x] 完成草稿"></textarea><div class="editor-help">儲存後會保留換行，也支援 - 項目、1. 編號、[ ] / [x] 勾選格式。</div></div><div class="form-row"><label>子事件／子任務</label><div id="subtaskEditors"></div><button type="button" class="small" id="addSubtaskBtn">＋ 新增子事件</button></div><div class="modal-actions"><button type="button" data-close-dialog="itemDialog">取消</button><button class="primary" type="submit">儲存事項</button></div></div></form></dialog>

  <dialog id="workspaceDialog"><form id="workspaceForm"><div class="modal-head"><h3 id="workspaceDialogTitle">新增頁面</h3><button class="small ghost" type="button" data-close-dialog="workspaceDialog">關閉</button></div><div class="modal-body"><input id="workspaceId" type="hidden" /><div class="form-row"><label>頁面名稱（上方按鈕）</label><input id="workspaceNameInput" type="text" placeholder="例如：個人事項、工作、考試準備" /></div><div class="form-row"><label>頁面標題</label><input id="workspaceTitleInput" type="text" placeholder="例如：個人事項時間軸" /></div><div class="form-row"><label>副標</label><input id="workspaceSubtitleInput" type="text" placeholder="可留空，例如：2026 年下半年" /></div><div class="form-row"><label>上方說明</label><textarea id="workspaceNoticeInput" placeholder="可留空，之後也能在設定裡修改。"></textarea></div><div class="modal-actions"><button type="button" data-close-dialog="workspaceDialog">取消</button><button class="primary" type="submit">儲存頁面</button></div></div></form></dialog>


  <dialog id="confirmDialog"><form method="dialog" id="confirmForm"><div class="modal-head"><h3 id="confirmTitle">確認操作</h3><button value="cancel" class="small ghost" id="confirmCloseBtn" type="button">關閉</button></div><div class="modal-body"><p id="confirmMessage">確定要執行這個操作嗎？</p><div class="modal-actions"><button value="cancel" id="confirmCancelBtn" type="button">取消</button><button class="primary danger" id="confirmOkBtn" type="button">確定</button></div></div></form></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(() => {
  const STORAGE_KEY = 'fuurinResearchTimelinePlanner.v1';
  const DEFAULT_SUBTITLE = '執行期間2026/7/1－2027/2/28';
  const audiences = ['幼兒園','家長／研究對象','教學老師','研究團隊','IRB／文件','資料分析'];
  const statuses = ['待確認','待辦','進行中','完成','延期','等待IRB','無'];
  const dateTypes = ['執行期間','執行日期','截止日期','提醒日期','會議時間','資料回收'];
  const colors = [
    ['purple','紫色'],['green','綠色'],['orange','橘色'],['blue','藍色'],['red','紅色'],['pink','粉色'],['teal','青綠'],['yellow','黃色'],['lavender','薰衣草'],['brown','棕色'],['gray','灰色']
  ];
  const uid = () => 'id_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
  const $ = id => document.getElementById(id);
  let app = loadApp();
  let data = currentWorkspace();
  let selectedAudiences = new Set(['全部']);
  let currentView = 'timeline';
  let pendingConfirm = null;

  function sampleData(){
    const s1 = uid(), s2 = uid();
    return { name:'研究執行', meta:{title:'研究執行時間軸', subtitle:DEFAULT_SUBTITLE, notice:'目前狀態：IRB 核准後進行園所協調與正式收案。', sortMode:'date'}, stages:[
      {id:s1,title:'階段一｜IRB 核准與園所確認',start:'2026-07-01',end:'2026-07-31',status:'待確認',color:'purple',desc:'完成倫理審查文件確認，並與合作幼兒園確認正式執行安排。',order:1,hidden:false},
      {id:s2,title:'階段二｜園所合作與上課前協調',start:'2026-07-15',end:'2026-08-31',status:'待辦',color:'green',desc:'完成公文交換、幼兒園會議、教學老師聯絡與課程前置作業。',order:2,hidden:false}
    ], items:[
      {id:uid(),stageId:s1,title:'確認 IRB 核准文件、案號與可檢附資料',status:'待確認',dateType:'截止日期',start:'2026-07-10',end:'2026-07-10',audiences:['研究團隊','IRB／文件'],owner:'玢潔',place:'文件確認',desc:'[ ] 確認核准證明\n[ ] 確認可提供幼兒園之附件\n[ ] 整理公文使用資料',subtasks:[],order:1,color:'purple',hidden:false},
      {id:uid(),stageId:s2,title:'A園｜9月課程前置作業與日程確認',status:'待辦',dateType:'執行期間',start:'2026-08-01',end:'2026-08-31',audiences:['幼兒園','教學老師','研究團隊'],owner:'玢潔、園方、教學老師',place:'A園',desc:'預計9月開始執行，8月底前完成家長同意書、前測、課程與後測時間安排。',subtasks:[{id:uid(),dateType:'執行期間',start:'2026-08-01',end:'2026-08-10',text:'與A園確認研究說明與協助事項',audiences:['幼兒園','研究團隊'],owner:'玢潔、園方',status:'待確認',note:''}],order:1,color:'green',hidden:false}
    ] };
  }
  function blankWorkspace(name='新頁面'){
    return { id:uid(), name, meta:{title:`${name}時間軸`, subtitle:'', notice:'', sortMode:'date'}, stages:[], items:[] };
  }
  function loadApp(){
    try{ const raw = localStorage.getItem(STORAGE_KEY); return normalizeApp(raw ? JSON.parse(raw) : null); }
    catch(e){ console.warn(e); return normalizeApp(null); }
  }
  function normalizeWorkspace(w, fallbackName='研究執行'){
    if(!w || typeof w !== 'object') w = sampleData();
    w.id = w.id || uid();
    w.name = w.name || fallbackName || w.meta?.title || '未命名頁面';
    w.meta = w.meta || {}; w.meta.title = w.meta.title || `${w.name}時間軸`;
    if(w.name === '研究執行' && (!w.meta.subtitle || w.meta.subtitle.includes('目標：2027') || w.meta.subtitle.includes('2026－2027'))) w.meta.subtitle = DEFAULT_SUBTITLE;
    w.meta.subtitle = w.meta.subtitle || '';
    w.meta.notice = w.meta.notice || '';
    if(w.name === '研究執行' && !w.meta.notice) w.meta.notice = '目前狀態：IRB 核准後進行園所協調與正式收案。';
    w.meta.sortMode = w.meta.sortMode || 'date';
    w.stages = Array.isArray(w.stages) ? w.stages : [];
    w.items = Array.isArray(w.items) ? w.items : [];
    w.stages.forEach((s,i)=>{ s.id=s.id||uid(); s.title=s.title||'(未命名階段)'; s.order=Number.isFinite(+s.order)?+s.order:i+1; s.color=s.color||'purple'; s.hidden=!!s.hidden; s.status=s.status||'待辦'; });
    w.items.forEach((it,i)=>{ it.id=it.id||uid(); it.order=Number.isFinite(+it.order)?+it.order:i+1; it.color=it.color||''; it.hidden=!!it.hidden; it.audiences=Array.isArray(it.audiences)?it.audiences:[]; it.subtasks=Array.isArray(it.subtasks)?it.subtasks:[]; it.status=it.status||'待辦'; it.dateType=it.dateType||((it.start&&it.end&&it.start!==it.end)?'執行期間':'執行日期'); it.subtasks.forEach((st,si)=>{ st.id=st.id||uid(); st.audiences=Array.isArray(st.audiences)?st.audiences:[]; st.status=st.status||'待辦'; st.dateType=st.dateType||'執行日期'; if(st.dateType==='執行期間'){ st.start=st.start||st.date||''; st.end=st.end||st.date||st.start||''; } else { st.date=st.date||st.start||''; } st.order=Number.isFinite(+st.order)?+st.order:si+1; st.color=st.color||''; }); });
    return w;
  }
  function normalizeApp(obj){
    let result;
    if(obj && Array.isArray(obj.workspaces)){
      result = { activeWorkspaceId: obj.activeWorkspaceId || obj.workspaces[0]?.id, workspaces: obj.workspaces.map((w,i)=>normalizeWorkspace(w, i===0?'研究執行':'未命名頁面')) };
    } else if(obj && (obj.meta || obj.stages || obj.items)){
      const w = normalizeWorkspace({...obj, id:'research_workspace', name:'研究執行'}, '研究執行');
      result = { activeWorkspaceId: w.id, workspaces:[w] };
    } else {
      const w = normalizeWorkspace({...sampleData(), id:'research_workspace'}, '研究執行');
      result = { activeWorkspaceId: w.id, workspaces:[w] };
    }
    if(!result.workspaces.length){ const w=normalizeWorkspace({...sampleData(), id:'research_workspace'}, '研究執行'); result.workspaces=[w]; result.activeWorkspaceId=w.id; }
    if(!result.workspaces.some(w=>String(w.id)===String(result.activeWorkspaceId))) result.activeWorkspaceId = result.workspaces[0].id;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
    return result;
  }
  function currentWorkspace(){ return app.workspaces.find(w=>String(w.id)===String(app.activeWorkspaceId)) || app.workspaces[0]; }
  function setActiveWorkspace(id){ app.activeWorkspaceId=id; data=currentWorkspace(); selectedAudiences=new Set(['全部']); currentView='timeline'; saveData(); renderAll(); }
  function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(app)); }

  function escapeHTML(str=''){ return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
  function statusClass(s='無'){ return 'status-' + String(s||'無').replace(/\s/g,''); }
  function audClass(a){ return String(a).replace(/[／\/\s]/g,''); }
  function fmtDate(d){ if(!d) return '未設定日期'; const [y,m,day]=String(d).split('-'); return y&&m&&day ? `${y}/${Number(m)}/${Number(day)}` : d; }
  function fmtRange(a,b){ if(a&&b&&a!==b) return `${fmtDate(a)}－${fmtDate(b)}`; return fmtDate(a||b); }
  function sortDateOf(o){ return o.start || o.date || o.end || '9999-12-31'; }
  function colorOf(c){ return colors.some(x=>x[0]===c) ? c : 'purple'; }
  function stageById(id){ return data.stages.find(s=>String(s.id)===String(id)); }
  function selectedAll(){ return selectedAudiences.has('全部'); }
  function intersects(list=[]){ return selectedAll() || (list||[]).some(a=>selectedAudiences.has(a)); }
  function audienceTags(list=[]){ return (list||[]).map(a=>`<span class="tag aud-${audClass(a)}">${escapeHTML(a)}</span>`).join(''); }
  function dateTypeLabel(type){ return type || '執行日期'; }
  function dateBadge(type,start,end){ const label=dateTypeLabel(type); return `<span class="date-badge date-${escapeHTML(label)}"><span class="date-kind">${escapeHTML(label)}</span>${escapeHTML(fmtRange(start,end))}</span>`; }
  function renderRichText(text=''){
    const lines = String(text||'').replace(/\r\n/g,'\n').split('\n');
    let html='', list=null;
    const closeList=()=>{ if(list){ html += list==='ol' ? '</ol>' : '</ul>'; list=null; } };
    for(const raw of lines){
      const line = raw.trimEnd();
      if(!line.trim()){ closeList(); html += '<p>&nbsp;</p>'; continue; }
      let m=line.match(/^\s*\[( |x|X)\]\s*(.*)$/);
      if(m){ closeList(); html += `<div class="checkline"><span class="fake-check ${m[1].toLowerCase()==='x'?'checked':''}">${m[1].toLowerCase()==='x'?'✓':''}</span><span>${escapeHTML(m[2])}</span></div>`; continue; }
      m=line.match(/^\s*[-•]\s+(.*)$/);
      if(m){ if(list!=='ul'){ closeList(); html+='<ul>'; list='ul'; } html += `<li>${escapeHTML(m[1])}</li>`; continue; }
      m=line.match(/^\s*\d+[\.、]\s+(.*)$/);
      if(m){ if(list!=='ol'){ closeList(); html+='<ol>'; list='ol'; } html += `<li>${escapeHTML(m[1])}</li>`; continue; }
      closeList(); html += `<p>${escapeHTML(line)}</p>`;
    }
    closeList(); return html;
  }
  function showToast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(showToast.timer); showToast.timer=setTimeout(()=>t.classList.remove('show'),2200); }
  function requestConfirm(message,onOk,opt={}){ pendingConfirm=onOk; $('confirmTitle').textContent=opt.title||'確認操作'; $('confirmMessage').textContent=message; $('confirmOkBtn').textContent=opt.okText||'確定'; $('confirmDialog').showModal(); }

  function sortedStages(includeHidden=false){
    const arr=[...data.stages].filter(s=>includeHidden || !s.hidden);
    return arr.sort((a,b)=>{
      if(!!a.hidden!==!!b.hidden) return a.hidden?1:-1;
      if(data.meta.sortMode==='manual') return (a.order||0)-(b.order||0) || sortDateOf(a).localeCompare(sortDateOf(b));
      return sortDateOf(a).localeCompare(sortDateOf(b)) || (a.order||0)-(b.order||0) || (a.title||'').localeCompare(b.title||'');
    });
  }
  function sortedItemsForStage(stageId, includeHidden=true){
    return data.items.filter(i=>String(i.stageId)===String(stageId) && (includeHidden || !i.hidden)).sort((a,b)=>{
      if(!!a.hidden!==!!b.hidden) return a.hidden?1:-1;
      if(data.meta.sortMode==='manual') return (a.order||0)-(b.order||0) || sortDateOf(a).localeCompare(sortDateOf(b));
      return sortDateOf(a).localeCompare(sortDateOf(b)) || (a.order||0)-(b.order||0) || (a.title||'').localeCompare(b.title||'');
    });
  }
  function sortedSubtasksForItem(item){
    const arr=[...(item?.subtasks||[])];
    return arr.sort((a,b)=>{
      if(data.meta.sortMode==='manual') return (a.order||0)-(b.order||0) || sortDateOf({start:subDates(a)[0],end:subDates(a)[1],date:a.date}).localeCompare(sortDateOf({start:subDates(b)[0],end:subDates(b)[1],date:b.date}));
      const ad=subDates(a), bd=subDates(b);
      return (ad[0]||'9999-12-31').localeCompare(bd[0]||'9999-12-31') || (ad[1]||'9999-12-31').localeCompare(bd[1]||'9999-12-31') || (a.order||0)-(b.order||0) || (a.text||'').localeCompare(b.text||'');
    });
  }
  function setSequentialOrders(){ sortedStages(true).forEach((s,i)=>s.order=i+1); data.stages.forEach(s=>sortedItemsForStage(s.id,true).forEach((it,i)=>{ it.order=i+1; sortedSubtasksForItem(it).forEach((st,si)=>st.order=si+1); })); saveData(); }
  function moveStage(id,dir){ const arr=sortedStages(true); const i=arr.findIndex(s=>String(s.id)===String(id)); const j=i+dir; if(i<0||j<0||j>=arr.length) return; data.meta.sortMode='manual'; [arr[i].order,arr[j].order]=[arr[j].order,arr[i].order]; saveData(); renderAll(); }
  function moveItem(id,dir){ const item=data.items.find(i=>String(i.id)===String(id)); if(!item) return; const arr=sortedItemsForStage(item.stageId,true); const i=arr.findIndex(x=>String(x.id)===String(id)); const j=i+dir; if(i<0||j<0||j>=arr.length) return; data.meta.sortMode='manual'; [arr[i].order,arr[j].order]=[arr[j].order,arr[i].order]; saveData(); renderAll(); }

  function renderWorkspaces(){
    const box=$('workspaceTabs'); if(!box) return; box.innerHTML='';
    app.workspaces.forEach(w=>{
      const btn=document.createElement('button'); btn.type='button'; btn.className='workspace-tab '+(String(w.id)===String(app.activeWorkspaceId)?'active':'');
      btn.textContent=w.name || w.meta?.title || '未命名頁面'; btn.onclick=()=>setActiveWorkspace(w.id); box.appendChild(btn);
    });
  }
  function renderAll(){
    data=currentWorkspace(); saveData(); $('siteTitle').textContent='工作與日常時程管理表'; $('siteSubtitle').textContent='統整研究、工作與日常事項的時間安排'; $('pageTitle').textContent=data.meta.title || data.name || '未命名頁面'; $('pageSubtitle').textContent=data.meta.subtitle || ''; $('noticeText').textContent=data.meta.notice || '';
    document.body.classList.toggle('date-view', currentView==='date');
    $('sortModeBtn').textContent = data.meta.sortMode === 'manual' ? '排序：手動優先' : '排序：日期優先';
    renderWorkspaces(); renderFilters(); renderViewControls(); renderTimeline(); renderDateBoard();
  }
  function renderFilters(){
    const box=$('filters'); box.innerHTML='<span class="label">對象</span>';
    ['全部',...audiences].forEach(a=>{ const btn=document.createElement('button'); btn.type='button'; btn.className='filter-chip '+(selectedAudiences.has(a)?'active':''); btn.textContent=a; btn.onclick=()=>{ if(a==='全部'){ selectedAudiences=new Set(['全部']); } else { selectedAudiences.delete('全部'); selectedAudiences.has(a)?selectedAudiences.delete(a):selectedAudiences.add(a); if(!selectedAudiences.size) selectedAudiences.add('全部'); } renderAll(); }; box.appendChild(btn); });
    const active=selectedAll()?'全部對象':[...selectedAudiences].join('、'); $('summaryText').textContent=`目前顯示：${active}。隱藏的事項不會出現在日期總表。`;
  }
  function renderViewControls(){ $('timelineViewBtn').classList.toggle('active',currentView==='timeline'); $('dateViewBtn').classList.toggle('active',currentView==='date'); }
  function stageVisibleForFilter(stage){ if(selectedAll()) return true; if(stage.hidden) return true; const items=data.items.filter(i=>String(i.stageId)===String(stage.id)); return items.some(i=>intersects(i.audiences)||(i.subtasks||[]).some(st=>intersects(st.audiences))); }
  function renderTimeline(){
    const timeline=$('timeline'), hiddenArea=$('hiddenStageArea'); timeline.innerHTML=''; hiddenArea.innerHTML='';
    const active=sortedStages(false).filter(stageVisibleForFilter), hidden=sortedStages(true).filter(s=>s.hidden).filter(stageVisibleForFilter);
    if(!active.length) timeline.innerHTML='<div class="empty">目前沒有符合篩選條件的階段或事項。</div>';
    active.forEach(stage=>timeline.appendChild(renderStage(stage)));
    if(hidden.length){ hiddenArea.innerHTML='<div class="stage-meta" style="margin:10px 0 8px;">已隱藏階段</div>'; hidden.forEach(stage=>hiddenArea.appendChild(renderStage(stage))); }
  }
  function renderStage(stage){
    const stageEl=document.createElement('article'); stageEl.className=`stage color-${colorOf(stage.color)} ${stage.hidden?'hidden':''}`; stageEl.dataset.stageId=stage.id;

  });
  document.addEventListener('drop',e=>{
    if(!dragInfo) return; const target=dropTargetForEvent(e); if(!target) return; e.preventDefault();
    const after=isAfterPointer(e,target);
    if(dragInfo.type==='stage') reorderStageByDrag(dragInfo.id,target.dataset.stageId,after);
    if(dragInfo.type==='item') reorderItemByDrag(dragInfo.parent,dragInfo.id,target.dataset.itemId,after);
    if(dragInfo.type==='subtask') reorderSubtaskByDrag(dragInfo.parent,dragInfo.id,target.dataset.subtaskId,after);
    if(dragInfo.type==='subtask-editor') reorderSubtaskEditorByDrag(dragInfo.id,target.dataset.subtaskId,after);
    dragInfo=null; clearDragState(); showToast('已切換為手動排序。');
  });

  function openWorkspaceDialog(ws=null){
    $('workspaceDialogTitle').textContent = ws ? '編輯頁面' : '新增頁面';
    $('workspaceId').value = ws?.id || '';
    $('workspaceNameInput').value = ws?.name || '';
    $('workspaceTitleInput').value = ws?.meta?.title || (ws?.name ? `${ws.name}時間軸` : '');
    $('workspaceSubtitleInput').value = ws?.meta?.subtitle || '';
    $('workspaceNoticeInput').value = ws?.meta?.notice || '';
    $('workspaceDialog').showModal();
  }
  $('workspaceForm').addEventListener('submit',e=>{
    e.preventDefault();
    const id=$('workspaceId').value;
    const name=$('workspaceNameInput').value.trim() || '新頁面';
    const title=$('workspaceTitleInput').value.trim() || `${name}時間軸`;
    const subtitle=$('workspaceSubtitleInput').value.trim();
    const notice=$('workspaceNoticeInput').value.trim();
    let ws=app.workspaces.find(w=>String(w.id)===String(id));
    if(!ws){ ws=blankWorkspace(name); app.workspaces.push(ws); app.activeWorkspaceId=ws.id; }
    ws.name=name; ws.meta.title=title; ws.meta.subtitle=subtitle; ws.meta.notice=notice;
    data=currentWorkspace(); $('workspaceDialog').close(); saveData(); renderAll(); showToast(id?'已更新頁面。':'已新增空白頁面。');
  });
  function deleteCurrentWorkspace(){
    if(app.workspaces.length<=1) return showToast('至少需要保留一個頁面。');
    const ws=currentWorkspace();
    requestConfirm(`確定要刪除「${ws.name || ws.meta.title}」嗎？這個頁面的階段與事項也會一起刪除。`,()=>{
      app.workspaces=app.workspaces.filter(w=>String(w.id)!==String(ws.id));
      app.activeWorkspaceId=app.workspaces[0].id; data=currentWorkspace(); saveData(); renderAll(); showToast('已刪除頁面。');
    },{title:'刪除頁面',okText:'確定刪除'});
  }

  document.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    if(b.dataset.closeDialog){ e.preventDefault(); $(b.dataset.closeDialog).close(); }
    if(b.dataset.addItem) openItemDialog(null,b.dataset.addItem);
    if(b.dataset.editStage) openStageDialog(data.stages.find(s=>String(s.id)===String(b.dataset.editStage)));
    if(b.dataset.editItem) openItemDialog(data.items.find(i=>String(i.id)===String(b.dataset.editItem)));
    if(b.dataset.deleteStage) deleteStage(b.dataset.deleteStage);
    if(b.dataset.deleteItem) deleteItem(b.dataset.deleteItem);
    if(b.dataset.toggleStage) toggleStage(b.dataset.toggleStage);
    if(b.dataset.toggleItem) toggleItem(b.dataset.toggleItem);
    if(b.dataset.moveStageUp) moveStage(b.dataset.moveStageUp,-1);
    if(b.dataset.moveStageDown) moveStage(b.dataset.moveStageDown,1);
    if(b.dataset.moveItemUp) moveItem(b.dataset.moveItemUp,-1);
    if(b.dataset.moveItemDown) moveItem(b.dataset.moveItemDown,1);
  });

  $('addStageTopBtn').onclick=()=>openStageDialog(null,'top'); $('addStageBottomBtn').onclick=()=>openStageDialog(null,'bottom'); $('addItemTopBtn').onclick=()=>{ if(!data.stages.length) return showToast('請先新增階段。'); openItemDialog(null, sortedStages(true)[0]?.id); };
  $('addWorkspaceBtn').onclick=()=>openWorkspaceDialog(null); $('editWorkspaceBtn').onclick=()=>openWorkspaceDialog(currentWorkspace()); $('deleteWorkspaceBtn').onclick=()=>deleteCurrentWorkspace();
  $('timelineViewBtn').onclick=()=>{ currentView='timeline'; renderAll(); }; $('dateViewBtn').onclick=()=>{ currentView='date'; renderAll(); }; $('sortModeBtn').onclick=()=>{ data.meta.sortMode=data.meta.sortMode==='manual'?'date':'manual'; if(data.meta.sortMode==='manual') setSequentialOrders(); renderAll(); };
  $('settingsBtn').onclick=()=>{ $('settingName').value=data.name||''; $('settingTitle').value=data.meta.title; $('settingSubtitle').value=data.meta.subtitle||''; $('settingNotice').value=data.meta.notice||''; $('settingsDialog').showModal(); }; $('editNoticeBtn').onclick=()=>$('settingsBtn').click();
  $('settingsForm').addEventListener('submit',e=>{ e.preventDefault(); const nm=$('settingName').value.trim(); if(nm) data.name=nm; data.meta.title=$('settingTitle').value.trim()||`${data.name||'新頁面'}時間軸`; data.meta.subtitle=$('settingSubtitle').value.trim(); data.meta.notice=$('settingNotice').value.trim(); $('settingsDialog').close(); renderAll(); });
  $('screenshotBtn').onclick=()=>document.body.classList.add('screenshot-mode'); $('screenshotExitBtn').onclick=()=>document.body.classList.remove('screenshot-mode');
  $('confirmOkBtn').onclick=()=>{ const fn=pendingConfirm; pendingConfirm=null; $('confirmDialog').close(); if(fn) fn(); }; $('confirmCancelBtn').onclick=()=>{ pendingConfirm=null; $('confirmDialog').close(); }; $('confirmCloseBtn').onclick=()=>{ pendingConfirm=null; $('confirmDialog').close(); };
  $('exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(app,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`timeline-planner-all-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href); };
  $('importBtn').onclick=()=>$('importFile').click(); $('importFile').addEventListener('change',async e=>{ const file=e.target.files?.[0]; if(!file) return; try{ const txt=await file.text(); app=normalizeApp(JSON.parse(txt)); data=currentWorkspace(); renderAll(); showToast('已匯入資料。'); }catch(err){ console.warn(err); showToast('匯入失敗，請確認 JSON 檔案。'); } e.target.value=''; });

  renderAll();
})();
</script>
</body>
</html>
