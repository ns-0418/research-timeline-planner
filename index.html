<body>
  <header>
    <div class="title"><h1 id="siteTitle">研究執行時間軸</h1><p id="siteSubtitle">執行期間2026/7/1－2027/2/28</p></div>

  }
  function updateSubDateEditor(div){ const isRange=div.querySelector('.st-date-type').value==='執行期間'; div.querySelector('.st-single-date').classList.toggle('hide',isRange); div.querySelector('.st-start-date').classList.toggle('hide',!isRange); div.querySelector('.st-end-date').classList.toggle('hide',!isRange); }

  $('stageForm').addEventListener('submit',e=>{ e.preventDefault(); const id=$('stageId').value; const payload={id:id||uid(),title:$('stageTitleInput').value.trim(),start:$('stageStartInput').value,end:$('stageEndInput').value,status:$('stageStatusInput').value,color:$('stageColorInput').value,desc:$('stageDescInput').value.trim(),hidden:!!data.stages.find(s=>s.id===id)?.hidden,order:data.stages.find(s=>s.id===id)?.order||data.stages.length+1}; if(!payload.title) return; const idx=data.stages.findIndex(s=>s.id===id); if(idx>=0)data.stages[idx]=payload; else data.stages.push(payload); $('stageDialog').close(); renderAll(); });
  $('itemDateTypeInput').addEventListener('change',updateItemDateLabels);
  $('addSubtaskBtn').onclick=()=>addSubtaskEditor({audiences:getCheckedAudiences($('audienceChecks'))});
  $('itemForm').addEventListener('submit',e=>{ e.preventDefault(); const id=$('itemId').value; const old=data.items.find(i=>i.id===id); const subtasks=[...$('subtaskEditors').querySelectorAll('.subtask-editor')].map((div,idx)=>{ const type=div.querySelector('.st-date-type').value; const base={id:div.dataset.id||uid(),dateType:type,text:div.querySelector('.st-text').value.trim(),audiences:getCheckedAudiences(div.querySelector('.st-audiences')),owner:div.querySelector('.st-owner').value.trim(),status:div.querySelector('.st-status').value,note:div.querySelector('.st-note').value.trim(),order:idx+1}; if(type==='執行期間'){ base.start=div.querySelector('.st-start').value; base.end=div.querySelector('.st-end').value; base.date=''; } else { base.date=div.querySelector('.st-date').value; base.start=''; base.end=''; } return base; }).filter(st=>st.text||st.date||st.start||st.note); const payload={id:id||uid(),stageId:$('itemStageInput').value,title:$('itemTitleInput').value.trim(),status:$('itemStatusInput').value,dateType:$('itemDateTypeInput').value,start:$('itemStartInput').value,end:$('itemDateTypeInput').value==='執行期間' ? $('itemEndInput').value : $('itemStartInput').value,audiences:getCheckedAudiences($('audienceChecks')),owner:$('itemOwnerInput').value.trim(),place:$('itemPlaceInput').value.trim(),desc:$('itemDescInput').value.trim(),subtasks,color:$('itemColorInput').value,hidden:!!old?.hidden,order:old?.order||data.items.length+1}; if(!payload.title) return; const idx=data.items.findIndex(i=>i.id===id); if(idx>=0)data.items[idx]=payload; else data.items.push(payload); $('itemDialog').close(); renderAll(); });

  function deleteStage(id){ const st=stageById(id); if(!st) return showToast('找不到這個階段。'); requestConfirm(`確定要刪除「${st.title}」嗎？此階段底下的事項也會一起刪除。`,()=>{ data.stages=data.stages.filter(s=>String(s.id)!==String(id)); data.items=data.items.filter(i=>String(i.stageId)!==String(id)); renderAll(); showToast('已刪除階段。'); },{title:'刪除階段',okText:'確定刪除'}); }
  function deleteItem(id){ const it=data.items.find(i=>String(i.id)===String(id)); if(!it) return showToast('找不到這個事項。'); requestConfirm(`確定要刪除「${it.title}」嗎？`,()=>{ data.items=data.items.filter(i=>String(i.id)!==String(id)); renderAll(); showToast('已刪除事項。'); },{title:'刪除事項',okText:'確定刪除'}); }
  function toggleStage(id){ const st=stageById(id); if(!st) return; st.hidden=!st.hidden; renderAll(); showToast(st.hidden?'已隱藏階段，並移到最下方。':'已恢復顯示階段。'); }
  function toggleItem(id){ const it=data.items.find(i=>String(i.id)===String(id)); if(!it) return; it.hidden=!it.hidden; renderAll(); showToast(it.hidden?'已隱藏事項，日期總表不再顯示。':'已恢復顯示事項。'); }

  document.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    if(b.dataset.closeDialog){ e.preventDefault(); $(b.dataset.closeDialog).close(); }
    if(b.dataset.addItem) openItemDialog(null,b.dataset.addItem);
    if(b.dataset.editStage) openStageDialog(data.stages.find(s=>String(s.id)===String(b.dataset.editStage)));
    if(b.dataset.editItem) openItemDialog(data.items.find(i=>String(i.id)===String(b.dataset.editItem)));
    if(b.dataset.deleteStage) deleteStage(b.dataset.deleteStage);
    if(b.dataset.deleteItem) deleteItem(b.dataset.deleteItem);
    if(b.dataset.toggleStage) toggleStage(b.dataset.toggleStage);
    if(b.dataset.toggleItem) toggleItem(b.dataset.toggleItem);
    if(b.dataset.moveStageUp) moveStage(b.dataset.moveStageUp,-1);
    if(b.dataset.moveStageDown) moveStage(b.dataset.moveStageDown,1);
    if(b.dataset.moveItemUp) moveItem(b.dataset.moveItemUp,-1);
    if(b.dataset.moveItemDown) moveItem(b.dataset.moveItemDown,1);
  });

  $('addStageTopBtn').onclick=()=>openStageDialog(null,'top'); $('addStageBottomBtn').onclick=()=>openStageDialog(null,'bottom'); $('addItemTopBtn').onclick=()=>{ if(!data.stages.length) return showToast('請先新增階段。'); openItemDialog(null, sortedStages(true)[0]?.id); };
  $('timelineViewBtn').onclick=()=>{ currentView='timeline'; renderAll(); }; $('dateViewBtn').onclick=()=>{ currentView='date'; renderAll(); }; $('sortModeBtn').onclick=()=>{ data.meta.sortMode=data.meta.sortMode==='manual'?'date':'manual'; if(data.meta.sortMode==='manual') setSequentialOrders(); renderAll(); };
  $('settingsBtn').onclick=()=>{ $('settingTitle').value=data.meta.title; $('settingSubtitle').value=data.meta.subtitle; $('settingNotice').value=data.meta.notice; $('settingsDialog').showModal(); }; $('editNoticeBtn').onclick=()=>$('settingsBtn').click();
  $('settingsForm').addEventListener('submit',e=>{ e.preventDefault(); data.meta.title=$('settingTitle').value.trim()||'研究執行時間軸'; data.meta.subtitle=$('settingSubtitle').value.trim()||DEFAULT_SUBTITLE; data.meta.notice=$('settingNotice').value.trim(); $('settingsDialog').close(); renderAll(); });
  $('screenshotBtn').onclick=()=>document.body.classList.add('screenshot-mode'); $('screenshotExitBtn').onclick=()=>document.body.classList.remove('screenshot-mode');
  $('confirmOkBtn').onclick=()=>{ const fn=pendingConfirm; pendingConfirm=null; $('confirmDialog').close(); if(fn) fn(); }; $('confirmCancelBtn').onclick=()=>{ pendingConfirm=null; $('confirmDialog').close(); }; $('confirmCloseBtn').onclick=()=>{ pendingConfirm=null; $('confirmDialog').close(); };
  $('exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`research-timeline-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href); };
  $('importBtn').onclick=()=>$('importFile').click(); $('importFile').addEventListener('change',async e=>{ const file=e.target.files?.[0]; if(!file) return; try{ const txt=await file.text(); data=normalizeData(JSON.parse(txt)); renderAll(); showToast('已匯入資料。'); }catch(err){ showToast('匯入失敗，請確認 JSON 檔案。'); } e.target.value=''; });

  renderAll();
})();
</script>
</body>
</html>
